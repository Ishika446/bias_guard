name: PatentLens AI CI/CD 🚀

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-and-test:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # ========================
      # 🔹 BACKEND SETUP
      # ========================
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest || true

      # ========================
      # 🔹 FRONTEND SETUP
      # ========================
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      # ========================
      # 🔹 DOCKER BUILD
      # ========================
      - name: Build backend Docker image
        run: |
          docker build -f infra/docker/backend.Dockerfile -t patentlens-backend .

      - name: Build frontend Docker image
        run: |
          docker build -f infra/docker/frontend.Dockerfile -t patentlens-frontend .